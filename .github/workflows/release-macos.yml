name: Build and release macOS installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Apple signing certificates
        shell: bash
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          CERT_PATH: ${{ runner.temp }}/pachevideo-certificates.p12
        run: |
          set -euo pipefail
          if [[ -z "$CERTIFICATE_P12" ]]; then
            echo "No signing certificate configured; building an ad-hoc signed test package."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/pachevideo-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path
          Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["CERTIFICATE_P12"]))
          PY
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build installer
        shell: bash
        env:
          MACOS_APPLICATION_IDENTITY: ${{ secrets.MACOS_APPLICATION_IDENTITY }}
          MACOS_INSTALLER_IDENTITY: ${{ secrets.MACOS_INSTALLER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          chmod +x scripts/build-macos-installer.sh
          chmod +x packaging/macos/pkg-scripts/preinstall packaging/macos/pkg-scripts/postinstall
          scripts/build-macos-installer.sh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PacheVideo-Premiere-macOS-${{ matrix.arch }}
          path: |
            dist/PacheVideo-Premiere-macOS-${{ matrix.arch }}.pkg
            dist/PacheVideo-Premiere-macOS-${{ matrix.arch }}.pkg.sha256
          if-no-files-found: error

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "PacheVideo Premiere $TAG" \
            --generate-notes
